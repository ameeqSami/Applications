<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Academic Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #1a1a2e 50%, #16213e 100%);
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* --- Stats Row --- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.08);
        }

        .stat-label {
            font-size: 0.85rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #f8fafc;
        }

        /* --- Menu (Three Dots) --- */
        .menu-container {
            position: relative;
        }

        .menu-dots {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: all 0.2s;
        }

        .menu-dots:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #60a5fa;
        }

        .dropdown {
            position: absolute;
            top: 50px;
            right: 0;
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            width: 200px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: none;
            z-index: 1000;
            overflow: hidden;
        }

        .dropdown.active {
            display: block;
        }

        .dropdown-item {
            padding: 12px 16px;
            color: #cbd5e1;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
            transition: background 0.2s;
        }

        .dropdown-item:hover {
            background: rgba(96, 165, 250, 0.1);
            color: #60a5fa;
        }

        /* --- Dashboard Layout --- */
        .dashboard-content {
            display: grid;
            grid-template-columns: 1fr 280px;
            gap: 30px;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tasks-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .task-item {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-left: 4px solid #22c55e;
            border-radius: 12px;
            padding: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }

        .task-item:hover {
            background: rgba(255, 255, 255, 0.07);
            transform: translateX(5px);
        }

        .task-item.overdue { border-left-color: #ef4444; background: rgba(239, 68, 68, 0.05); }
        .task-item.critical { border-left-color: #f97316; background: rgba(249, 115, 22, 0.05); }
        .task-item.warning { border-left-color: #eab308; background: rgba(234, 179, 8, 0.05); }

        .task-info h4 { font-size: 1.05rem; margin-bottom: 4px; color: #f1f5f9; }
        .task-info p { font-size: 0.85rem; color: #94a3b8; }

        .task-meta { text-align: right; }
        .badge {
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-type { background: rgba(139, 92, 246, 0.2); color: #c4b5fd; }

        .deadline-text { font-size: 0.8rem; margin-top: 6px; color: #cbd5e1; }

        /* --- Filters Sidebar --- */
        .filters-panel {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 20px;
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .filter-group { margin-bottom: 25px; }
        .filter-group h5 { font-size: 0.9rem; color: #60a5fa; margin-bottom: 12px; }
        .filter-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            color: #cbd5e1;
        }
        .filter-item input { width: auto; cursor: pointer; }

        @media (max-width: 900px) {
            .dashboard-content { grid-template-columns: 1fr; }
            .filters-panel { position: static; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎓 Academic Dashboard</h1>
            <div class="menu-container">
                <button class="menu-dots" id="menu-btn">⋮</button>
                <div class="dropdown" id="dropdown">
                    <a href="/add-task" class="dropdown-item">➕ Add Assignment</a>
                    <a href="/cgpa" class="dropdown-item">🔢 CGPA Calculator</a>
                    <hr style="opacity: 0.1;">
                    <a href="#" class="dropdown-item" onclick="location.reload()">🔄 Refresh</a>
                </div>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-label">Total Tasks</span>
                <span class="stat-value" id="stat-total">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Overdue</span>
                <span class="stat-value" id="stat-overdue" style="color: #ef4444;">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Critical</span>
                <span class="stat-value" id="stat-critical" style="color: #f97316;">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Upcoming</span>
                <span class="stat-value" id="stat-warning" style="color: #eab308;">0</span>
            </div>
        </div>

        <div class="dashboard-content">
            <main>
                <div class="section-title">📋 Active Assignments</div>
                <div id="tasks-loading" style="text-align: center; padding: 40px; color: #60a5fa;">Loading tasks...</div>
                <div id="tasks-container" class="tasks-list"></div>
            </main>

            <aside class="filters-panel">
                <div class="filter-group">
                    <h5>Visibility</h5>
                    <label class="filter-item">
                        <input type="checkbox" id="filter-hide-overdue">
                        <span>Hide Overdue</span>
                    </label>
                </div>
                <div id="subject-filters" class="filter-group">
                    <h5>Subjects</h5>
                    <!-- Filled by JS -->
                </div>
                <div id="type-filters" class="filter-group">
                    <h5>Task Types</h5>
                    <!-- Filled by JS -->
                </div>
            </aside>
        </div>
    </div>

    <script>
        const API_URL = '';
        let allTasks = [];
        let activeFilters = { subjects: [], types: [], hideOverdue: false };

        // Menu Toggle
        const menuBtn = document.getElementById('menu-btn');
        const dropdown = document.getElementById('dropdown');
        menuBtn.onclick = (e) => {
            e.stopPropagation();
            dropdown.classList.toggle('active');
        };
        window.onclick = () => dropdown.classList.remove('active');

        async function init() {
            await fetchTasks();
        }

        async function fetchTasks() {
            try {
                const response = await fetch(`${API_URL}/tasks`);
                allTasks = await response.json();
                updateStats();
                generateFilters();
                renderTasks();
            } catch (error) {
                document.getElementById('tasks-loading').textContent = '❌ Failed to connect to API';
            }
        }

        function updateStats() {
            const stats = { total: allTasks.length, overdue: 0, critical: 0, warning: 0 };
            allTasks.forEach(t => {
                const h = (new Date(t.deadline) - new Date()) / 36e5;
                if (h < 0) stats.overdue++;
                else if (h <= 24) stats.critical++;
                else if (h <= 72) stats.warning++;
            });
            document.getElementById('stat-total').textContent = stats.total;
            document.getElementById('stat-overdue').textContent = stats.overdue;
            document.getElementById('stat-critical').textContent = stats.critical;
            document.getElementById('stat-warning').textContent = stats.warning;
        }

        function generateFilters() {
            const subjs = [...new Set(allTasks.map(t => t.subject))].sort();
            const types = [...new Set(allTasks.map(t => t.task_type))].sort();
            
            const sContainer = document.getElementById('subject-filters');
            sContainer.innerHTML = '<h5>Subjects</h5>';
            subjs.forEach(s => {
                const label = createFilterItem(s, 'subject');
                sContainer.appendChild(label);
            });

            const tContainer = document.getElementById('type-filters');
            tContainer.innerHTML = '<h5>Task Types</h5>';
            types.forEach(t => {
                const label = createFilterItem(t, 'type');
                tContainer.appendChild(label);
            });
        }

        function createFilterItem(name, category) {
            const label = document.createElement('label');
            label.className = 'filter-item';
            const input = document.createElement('input');
            input.type = 'checkbox';
            input.checked = true;
            input.onchange = renderTasks;
            input.dataset.name = name;
            input.dataset.category = category;
            label.appendChild(input);
            label.appendChild(document.createTextNode(name));
            return label;
        }

        function renderTasks() {
            document.getElementById('tasks-loading').style.display = 'none';
            const container = document.getElementById('tasks-container');
            const hideOverdue = document.getElementById('filter-hide-overdue').checked;
            
            const selectedSubjs = [...document.querySelectorAll('[data-category="subject"]:checked')].map(i => i.dataset.name);
            const selectedTypes = [...document.querySelectorAll('[data-category="type"]:checked')].map(i => i.dataset.name);

            const filtered = allTasks.filter(t => {
                const h = (new Date(t.deadline) - new Date()) / 36e5;
                if (hideOverdue && h < 0) return false;
                if (selectedSubjs.length && !selectedSubjs.includes(t.subject)) return false;
                if (selectedTypes.length && !selectedTypes.includes(t.task_type)) return false;
                return true;
            });

            if (!filtered.length) {
                container.innerHTML = '<div style="text-align:center; padding:40px; color:#94a3b8; border:1px dashed rgba(255,255,255,0.1); border-radius:12px;">No assignments matching filters</div>';
                return;
            }

            container.innerHTML = filtered.map(t => {
                const h = (new Date(t.deadline) - new Date()) / 36e5;
                const urg = h < 0 ? 'overdue' : h <= 24 ? 'critical' : h <= 72 ? 'warning' : 'normal';
                const dateStr = new Date(t.deadline).toLocaleDateString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                
                return `
                    <div class="task-item ${urg}">
                        <div class="task-info">
                            <h4>${t.title}</h4>
                            <p>📚 ${t.subject} • ⚖️ ${t.weightage}%</p>
                        </div>
                        <div class="task-meta">
                            <span class="badge badge-type">${t.task_type}</span>
                            <div class="deadline-text">${dateStr}</div>
                            <div style="margin-top: 10px; display: flex; gap: 8px; justify-content: flex-end;">
                                <button onclick="editTask(${t.id})" style="padding: 4px 8px; font-size: 0.7rem; width: auto; background: rgba(96, 165, 250, 0.2); color: #60a5fa; border: 1px solid #60a5fa;">✎</button>
                                <button onclick="deleteTask(${t.id})" style="padding: 4px 8px; font-size: 0.7rem; width: auto; background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid #ef4444;">🗑</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function deleteTask(id) {
            if (!confirm('Are you sure you want to delete this task?')) return;
            try {
                const response = await fetch(`${API_URL}/tasks/${id}`, { method: 'DELETE' });
                if (response.ok) fetchTasks();
            } catch (error) {
                alert('Error deleting task');
            }
        }

        function editTask(id) {
            // For now, redirect to add-task with edit mode or just alert
            // A better way would be a separate edit-task page, but for simplicity:
            window.location.href = `/add-task?id=${id}`;
        }

        document.getElementById('filter-hide-overdue').onchange = renderTasks;
        init();
    </script>
</body>
</html>
