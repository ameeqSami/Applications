<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Assessment Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #1a1a2e 50%, #16213e 100%);
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding: 20px 0;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats-bar {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px 20px;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
        }

        .stat-value {
            font-weight: 700;
            font-size: 1.2rem;
            color: #60a5fa;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 25px;
            margin-bottom: 20px;
        }

        .tasks-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .form-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .form-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 5px;
            color: #cbd5e1;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px 12px;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #e2e8f0;
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #60a5fa;
            background: rgba(30, 41, 59, 1);
            box-shadow: 0 0 0 2px rgba(96, 165, 250, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        button {
            width: 100%;
            padding: 11px 16px;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(96, 165, 250, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .filters-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 18px;
            backdrop-filter: blur(10px);
            position: sticky;
            top: 20px;
        }

        .filter-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .filter-group {
            margin-bottom: 12px;
        }

        .filter-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-weight: 400;
            margin-bottom: 0;
        }

        .filter-group input[type="checkbox"] {
            width: auto;
            cursor: pointer;
        }

        .tasks-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .task-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 4px solid #22c55e;
            border-radius: 10px;
            padding: 15px;
            backdrop-filter: blur(10px);
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 15px;
        }

        .task-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(4px);
        }

        .task-item.overdue {
            border-left-color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        .task-item.critical {
            border-left-color: #f97316;
            background: rgba(249, 115, 22, 0.1);
        }

        .task-item.warning {
            border-left-color: #eab308;
            background: rgba(234, 179, 8, 0.1);
        }

        .task-content {
            flex: 1;
            min-width: 0;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            gap: 10px;
            margin-bottom: 8px;
        }

        .task-title {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 4px;
        }

        .task-subject {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 6px;
        }

        .task-meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
            font-size: 0.8rem;
        }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.75rem;
        }

        .badge-overdue {
            background: #ef4444;
            color: white;
        }

        .badge-critical {
            background: #f97316;
            color: white;
        }

        .badge-warning {
            background: #eab308;
            color: black;
        }

        .badge-normal {
            background: #22c55e;
            color: black;
        }

        .badge-type {
            background: rgba(139, 92, 246, 0.25);
            color: #c4b5fd;
            border: 1px solid #7c3aed;
        }

        .task-deadline {
            color: #cbd5e1;
            font-size: 0.85rem;
        }

        .task-weightage {
            color: #94a3b8;
            font-size: 0.8rem;
        }

        .task-notes {
            color: #94a3b8;
            font-size: 0.85rem;
            margin-top: 8px;
            font-style: italic;
        }

        .task-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 0.8rem;
            background: rgba(96, 165, 250, 0.2);
            border: 1px solid #60a5fa;
            border-radius: 6px;
            color: #60a5fa;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .btn-small:hover {
            background: #60a5fa;
            color: white;
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.2);
            border-color: #ef4444;
            color: #ef4444;
        }

        .btn-delete:hover {
            background: #ef4444;
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #94a3b8;
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #60a5fa;
        }

        .error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            border-radius: 8px;
            padding: 12px 15px;
            color: #fecaca;
            margin-bottom: 15px;
        }

        .success {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid #22c55e;
            border-radius: 8px;
            padding: 12px 15px;
            color: #86efac;
            margin-bottom: 15px;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .filters-card {
                position: static;
            }

            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .stats-bar {
                width: 100%;
            }

            h1 {
                font-size: 1.8rem;
            }
        }

        @media (max-width: 640px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .task-header {
                flex-direction: column;
            }

            .task-item {
                flex-direction: column;
            }

            .task-actions {
                width: 100%;
            }

            .btn-small {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎓 Academic Assessment Tracker</h1>
            <div class="stats-bar">
                <div class="stat-card">
                    <span>Total:</span>
                    <span class="stat-value" id="stat-total">0</span>
                </div>
                <div class="stat-card">
                    <span>📍 Overdue:</span>
                    <span class="stat-value" id="stat-overdue">0</span>
                </div>
                <div class="stat-card">
                    <span>🔴 Critical:</span>
                    <span class="stat-value" id="stat-critical">0</span>
                </div>
                <div class="stat-card">
                    <span>🟡 Warning:</span>
                    <span class="stat-value" id="stat-warning">0</span>
                </div>
            </div>
        </header>

        <div class="main-content">
            <div class="tasks-section">
                <div id="message-container"></div>
                
                <div class="form-card">
                    <div class="form-title">➕ Add New Task</div>
                    <form id="task-form">
                        <div class="form-group">
                            <label for="title">Title *</label>
                            <input type="text" id="title" placeholder="e.g., Midterm Assignment" required>
                        </div>
                        <div class="form-group">
                            <label for="subject">Subject *</label>
                            <input type="text" id="subject" placeholder="e.g., Data Structures" required>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="task-type">Type</label>
                                <select id="task-type">
                                    <option>Assignment</option>
                                    <option>Quiz</option>
                                    <option>Exam</option>
                                    <option>Project</option>
                                    <option>Lab</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="weightage">Weightage (%)</label>
                                <input type="number" id="weightage" min="0" max="100" value="20">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="deadline-date">Deadline Date *</label>
                                <input type="date" id="deadline-date" required>
                            </div>
                            <div class="form-group">
                                <label for="deadline-time">Deadline Time *</label>
                                <input type="time" id="deadline-time" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="notes">Notes (optional)</label>
                            <textarea id="notes" placeholder="Add any additional notes..."></textarea>
                        </div>
                        <button type="submit">💾 Save Task</button>
                    </form>
                </div>

                <div class="tasks-section">
                    <h2 style="margin-bottom: 10px;">📋 Tasks</h2>
                    <div id="tasks-loading" class="loading">Loading tasks...</div>
                    <div id="tasks-container" class="tasks-list"></div>
                </div>
            </div>

            <aside>
                <div class="filters-card">
                    <div class="filter-title">🔍 Filters</div>
                    <div class="filter-group">
                        <label>
                            <input type="checkbox" id="filter-hide-overdue" checked>
                            <span>Hide overdue</span>
                        </label>
                    </div>
                    <div id="subject-filters" class="filter-group"></div>
                    <div id="type-filters" class="filter-group"></div>
                </div>
            </aside>
        </div>
    </div>

    <script>
        const API_URL = 'http://127.0.0.1:8000';

        let allTasks = [];
        let filters = {
            subjects: [],
            types: [],
            hideOverdue: false
        };

        // Set default date/time
        function setDefaultDateTime() {
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 3);
            document.getElementById('deadline-date').valueAsDate = tomorrow;

            const now = new Date();
            document.getElementById('deadline-time').value = now.toTimeString().slice(0, 5);
        }

        // Show message
        function showMessage(message, type = 'success') {
            const container = document.getElementById('message-container');
            const div = document.createElement('div');
            div.className = type;
            div.textContent = message;
            container.innerHTML = '';
            container.appendChild(div);
            setTimeout(() => div.remove(), 4000);
        }

        // Fetch tasks
        async function fetchTasks() {
            try {
                const response = await fetch(`${API_URL}/tasks`);
                if (!response.ok) throw new Error('Failed to fetch');
                allTasks = await response.json();
                updateFilters();
                renderTasks();
                updateStats();
            } catch (error) {
                console.error('Error fetching tasks:', error);
                document.getElementById('tasks-loading').innerHTML = '❌ Failed to load tasks. Is the API running?';
            }
        }

        // Calculate hours until deadline
        function hoursUntilDeadline(deadline) {
            const now = new Date();
            const dl = new Date(deadline);
            return (dl - now) / (1000 * 60 * 60);
        }

        // Classify urgency
        function classifyUrgency(deadline) {
            const hours = hoursUntilDeadline(deadline);
            if (hours < 0) return 'overdue';
            if (hours <= 24) return 'critical';
            if (hours <= 72) return 'warning';
            return 'normal';
        }

        // Format deadline display
        function formatDeadline(deadline) {
            const date = new Date(deadline);
            const hours = hoursUntilDeadline(deadline);
            const formatted = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) 
                + ' ' + date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            
            if (hours < 0) {
                return `${formatted} • Overdue by ${Math.floor(Math.abs(hours))}h`;
            } else if (hours < 48) {
                return `${formatted} • ${Math.floor(hours)}h left`;
            } else {
                return `${formatted} • ${Math.floor(hours / 24)}d left`;
            }
        }

        // Update filters
        function updateFilters() {
            const subjects = [...new Set(allTasks.map(t => t.subject))].sort();
            const types = [...new Set(allTasks.map(t => t.task_type))].sort();

            const subjectFilters = document.getElementById('subject-filters');
            subjectFilters.innerHTML = '<strong style="font-size: 0.9rem; display: block; margin-bottom: 8px;">Subjects</strong>';
            subjects.forEach(subject => {
                const label = document.createElement('label');
                const input = document.createElement('input');
                input.type = 'checkbox';
                input.value = subject;
                input.checked = true;
                input.onchange = () => {
                    filters.subjects = subjects.filter(s => 
                        document.querySelector(`input[value="${s}"]`)?.checked
                    );
                    renderTasks();
                };
                label.appendChild(input);
                label.appendChild(document.createTextNode(subject));
                subjectFilters.appendChild(label);
            });
            filters.subjects = subjects;

            const typeFilters = document.getElementById('type-filters');
            typeFilters.innerHTML = '<strong style="font-size: 0.9rem; display: block; margin-bottom: 8px; margin-top: 10px;">Types</strong>';
            types.forEach(type => {
                const label = document.createElement('label');
                const input = document.createElement('input');
                input.type = 'checkbox';
                input.value = type;
                input.checked = true;
                input.onchange = () => {
                    filters.types = types.filter(t => 
                        document.querySelector(`input[value="${t}"]`)?.checked
                    );
                    renderTasks();
                };
                label.appendChild(input);
                label.appendChild(document.createTextNode(type));
                typeFilters.appendChild(label);
            });
            filters.types = types;
        }

        // Render tasks
        function renderTasks() {
            document.getElementById('tasks-loading').style.display = 'none';
            const container = document.getElementById('tasks-container');

            filters.hideOverdue = document.getElementById('filter-hide-overdue').checked;

            const filtered = allTasks.filter(task => {
                const urgency = classifyUrgency(task.deadline);
                if (filters.hideOverdue && urgency === 'overdue') return false;
                if (!filters.subjects.includes(task.subject)) return false;
                if (!filters.types.includes(task.task_type)) return false;
                return true;
            });

            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">✓</div><p>No tasks to show</p></div>';
                return;
            }

            container.innerHTML = filtered.map(task => {
                const urgency = classifyUrgency(task.deadline);
                return `
                    <div class="task-item ${urgency}">
                        <div class="task-content">
                            <div class="task-title">${task.title}</div>
                            <div class="task-subject">📚 ${task.subject}</div>
                            <div class="task-meta">
                                <span class="badge badge-${urgency}">${urgency.toUpperCase()}</span>
                                <span class="badge badge-type">${task.task_type}</span>
                                <span class="task-weightage">⚖️ ${task.weightage}%</span>
                            </div>
                            <div class="task-deadline">📅 ${formatDeadline(task.deadline)}</div>
                            ${task.notes ? `<div class="task-notes">"${task.notes}"</div>` : ''}
                        </div>
                        <div class="task-actions">
                            <button class="btn-small" onclick="editTask(${task.id})">✎ Edit</button>
                            <button class="btn-small btn-delete" onclick="deleteTask(${task.id})">🗑 Delete</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Update stats
        function updateStats() {
            const stats = {
                total: allTasks.length,
                overdue: 0,
                critical: 0,
                warning: 0
            };

            allTasks.forEach(task => {
                const urgency = classifyUrgency(task.deadline);
                if (urgency === 'overdue') stats.overdue++;
                else if (urgency === 'critical') stats.critical++;
                else if (urgency === 'warning') stats.warning++;
            });

            document.getElementById('stat-total').textContent = stats.total;
            document.getElementById('stat-overdue').textContent = stats.overdue;
            document.getElementById('stat-critical').textContent = stats.critical;
            document.getElementById('stat-warning').textContent = stats.warning;
        }

        // Create task
        async function createTask(event) {
            event.preventDefault();
            
            const deadline = new Date(
                document.getElementById('deadline-date').value + 'T' + 
                document.getElementById('deadline-time').value
            );

            const payload = {
                title: document.getElementById('title').value,
                subject: document.getElementById('subject').value,
                task_type: document.getElementById('task-type').value,
                deadline: deadline.toISOString(),
                weightage: parseFloat(document.getElementById('weightage').value),
                notes: document.getElementById('notes').value || null
            };

            try {
                const response = await fetch(`${API_URL}/tasks`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Failed to create task');
                }

                document.getElementById('task-form').reset();
                setDefaultDateTime();
                showMessage('✅ Task created successfully!');
                fetchTasks();
            } catch (error) {
                showMessage(`❌ ${error.message}`, 'error');
            }
        }

        // Delete task
        async function deleteTask(taskId) {
            if (!confirm('Are you sure you want to delete this task?')) return;

            try {
                const response = await fetch(`${API_URL}/tasks/${taskId}`, {
                    method: 'DELETE'
                });
                
                if (!response.ok) throw new Error('Failed to delete task');
                showMessage('✅ Task deleted successfully!');
                fetchTasks();
            } catch (error) {
                showMessage(`❌ ${error.message}`, 'error');
            }
        }

        // Edit task (placeholder)
        function editTask(taskId) {
            const task = allTasks.find(t => t.id === taskId);
            if (!task) return;

            document.getElementById('title').value = task.title;
            document.getElementById('subject').value = task.subject;
            document.getElementById('task-type').value = task.task_type;
            document.getElementById('weightage').value = task.weightage;
            document.getElementById('notes').value = task.notes || '';

            const deadline = new Date(task.deadline);
            document.getElementById('deadline-date').valueAsDate = deadline;
            document.getElementById('deadline-time').value = deadline.toTimeString().slice(0, 5);

            window.scrollTo(0, 0);
            document.getElementById('title').focus();
        }

        // Event listeners
        document.getElementById('task-form').addEventListener('submit', createTask);
        document.getElementById('filter-hide-overdue').addEventListener('change', renderTasks);

        // Initialize
        setDefaultDateTime();
        fetchTasks();

        // Refresh every 30 seconds
        setInterval(fetchTasks, 30000);
    </script>
</body>
</html>
