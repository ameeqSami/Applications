<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Task | Academic Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #1a1a2e 50%, #16213e 100%);
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        header {
            margin-bottom: 30px;
            text-align: center;
        }

        .nav-link {
            color: #60a5fa;
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            margin-bottom: 15px;
        }

        .nav-link:hover {
            color: #a78bfa;
            transform: translateX(-4px);
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .form-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: #cbd5e1;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #e2e8f0;
            font-family: inherit;
            font-size: 0.95rem;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #60a5fa;
            background: rgba(30, 41, 59, 1);
            box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(96, 165, 250, 0.3);
        }

        .success-msg {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid #22c55e;
            color: #86efac;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="/" class="nav-link">← Back to Dashboard</a>
            <h1>➕ Add New Task</h1>
        </header>

        <div id="success" class="success-msg">✅ Task created successfully!</div>

        <div class="form-card">
            <form id="task-form">
                <div class="form-group">
                    <label for="title">Title *</label>
                    <input type="text" id="title" placeholder="e.g., Final Exam Study" required>
                </div>
                <div class="form-group">
                    <label for="subject">Subject *</label>
                    <input type="text" id="subject" placeholder="e.g., Advanced Mathematics" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="task-type">Type</label>
                        <select id="task-type">
                            <option>Assignment</option>
                            <option>Quiz</option>
                            <option>Exam</option>
                            <option>Project</option>
                            <option>Lab</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="weightage">Weightage (%)</label>
                        <input type="number" id="weightage" min="0" max="100" value="20">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="deadline-date">Deadline Date *</label>
                        <input type="date" id="deadline-date" required>
                    </div>
                    <div class="form-group">
                        <label for="deadline-time">Deadline Time *</label>
                        <input type="time" id="deadline-time" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="notes">Notes (optional)</label>
                    <textarea id="notes" placeholder="Any specific details..."></textarea>
                </div>
                <button type="submit">💾 Save Task</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = '';
        let editId = null;

        // Set default date/time and check for edit mode
        window.onload = async () => {
            const params = new URLSearchParams(window.location.search);
            editId = params.get('id');

            if (editId) {
                document.querySelector('h1').textContent = '✏️ Edit Assignment';
                document.title = 'Edit Assignment | Academic Tracker';
                await fetchAndPopulate(editId);
            } else {
                const tomorrow = new Date();
                tomorrow.setDate(tomorrow.getDate() + 3);
                document.getElementById('deadline-date').valueAsDate = tomorrow;
                const now = new Date();
                document.getElementById('deadline-time').value = now.toTimeString().slice(0, 5);
            }
        };

        async function fetchAndPopulate(id) {
            try {
                const response = await fetch(`${API_URL}/tasks/${id}`);
                const task = await response.json();
                
                document.getElementById('title').value = task.title;
                document.getElementById('subject').value = task.subject;
                document.getElementById('task-type').value = task.task_type;
                document.getElementById('weightage').value = task.weightage;
                document.getElementById('notes').value = task.notes || '';
                
                const deadline = new Date(task.deadline);
                document.getElementById('deadline-date').valueAsDate = deadline;
                document.getElementById('deadline-time').value = deadline.toTimeString().slice(0, 5);
            } catch (error) {
                alert('Error fetching task data');
            }
        }

        document.getElementById('task-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const deadline = new Date(
                document.getElementById('deadline-date').value + 'T' + 
                document.getElementById('deadline-time').value
            );

            const payload = {
                title: document.getElementById('title').value,
                subject: document.getElementById('subject').value,
                task_type: document.getElementById('task-type').value,
                deadline: deadline.toISOString(),
                weightage: parseFloat(document.getElementById('weightage').value),
                notes: document.getElementById('notes').value || null
            };

            try {
                const url = editId ? `${API_URL}/tasks/${editId}` : `${API_URL}/tasks`;
                const method = editId ? 'PUT' : 'POST';
                
                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (!response.ok) throw new Error('Failed to save task');

                document.getElementById('success').textContent = editId ? '✅ Task updated successfully!' : '✅ Task created successfully!';
                document.getElementById('success').style.display = 'block';
                
                setTimeout(() => {
                    window.location.href = '/';
                }, 1500);

            } catch (error) {
                alert('❌ Error: ' + error.message);
            }
        });
    </script>
</body>
</html>
