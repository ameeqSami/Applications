<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGPA Calculator | Academic Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #1a1a2e 50%, #16213e 100%);
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding: 20px 0;
        }

        .nav-link {
            color: #60a5fa;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .nav-link:hover {
            color: #a78bfa;
            transform: translateX(-4px);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 30px;
            backdrop-filter: blur(10px);
            margin-bottom: 30px;
        }

        .calc-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .calc-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #f8fafc;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        th {
            text-align: left;
            padding: 12px;
            color: #94a3b8;
            font-weight: 600;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        td {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        input, select {
            width: 100%;
            padding: 10px;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #e2e8f0;
            font-family: inherit;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #60a5fa;
            background: rgba(30, 41, 59, 1);
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(96, 165, 250, 0.3);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #cbd5e1;
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: #60a5fa;
            color: #60a5fa;
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            padding: 8px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-danger:hover {
            background: #ef4444;
            color: white;
        }

        .results-card {
            background: rgba(96, 165, 250, 0.1);
            border: 1px solid rgba(96, 165, 250, 0.2);
            padding: 25px;
            border-radius: 14px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            text-align: center;
        }

        .result-item label {
            display: block;
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .result-value {
            font-size: 2.2rem;
            font-weight: 700;
            color: #60a5fa;
        }

        .result-value.high { color: #22c55e; }
        .result-value.mid { color: #eab308; }
        .result-value.low { color: #ef4444; }

        .actions {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }

        @media (max-width: 640px) {
            .calc-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
            
            table {
                display: block;
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="/" class="nav-link">← Back to Tasks</a>
            <h1>🔢 CGPA Calculator</h1>
        </header>

        <div class="card">
            <div class="calc-header">
                <div class="calc-title">Course Details</div>
                <button class="btn btn-outline" onclick="addRow()">+ Add Course</button>
            </div>

            <table id="course-table">
                <thead>
                    <tr>
                        <th style="width: 45%;">Course Name</th>
                        <th style="width: 20%;">Credits</th>
                        <th style="width: 25%;">Grade</th>
                        <th style="width: 10%;"></th>
                    </tr>
                </thead>
                <tbody id="course-body">
                    <!-- Rows will be added here -->
                </tbody>
            </table>

            <div class="actions">
                <button class="btn btn-primary" onclick="calculateCGPA()">Calculate Now</button>
                <button class="btn btn-outline" onclick="resetForm()">Reset</button>
            </div>
        </div>

        <div id="results" class="results-card" style="display: none;">
            <div class="result-item">
                <label>Current CGPA</label>
                <div id="cgpa-value" class="result-value">0.00</div>
            </div>
            <div class="result-item">
                <label>Total Credits</label>
                <div id="total-credits" class="result-value" style="color: #e2e8f0;">0</div>
            </div>
            <div class="result-item">
                <label>Academic Standing</label>
                <div id="standing" class="result-value" style="font-size: 1.2rem; padding-top: 10px;">-</div>
            </div>
        </div>
    </div>

    <script>
        const gradeScale = {
            'A': 4.0, 'A-': 3.7, 'B+': 3.3, 'B': 3.0, 'B-': 2.7,
            'C+': 2.3, 'C': 2.0, 'C-': 1.7, 'D+': 1.3, 'D': 1.0, 'F': 0.0
        };

        function addRow() {
            const tbody = document.getElementById('course-body');
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><input type="text" placeholder="e.g. Algorithms" class="course-name"></td>
                <td><input type="number" step="0.5" min="0" value="3.0" class="course-credits"></td>
                <td>
                    <select class="course-grade">
                        ${Object.keys(gradeScale).map(g => `<option value="${g}">${g}</option>`).join('')}
                    </select>
                </td>
                <td><button class="btn btn-danger" onclick="removeRow(this)">×</button></td>
            `;
            tbody.appendChild(row);
        }

        function removeRow(btn) {
            btn.closest('tr').remove();
        }

        function calculateCGPA() {
            const credits = document.querySelectorAll('.course-credits');
            const grades = document.querySelectorAll('.course-grade');
            
            let totalPoints = 0;
            let totalCredits = 0;

            for (let i = 0; i < credits.length; i++) {
                const c = parseFloat(credits[i].value) || 0;
                const g = gradeScale[grades[i].value];
                totalPoints += (c * g);
                totalCredits += c;
            }

            const cgpa = totalCredits > 0 ? (totalPoints / totalCredits) : 0;
            
            document.getElementById('cgpa-value').textContent = cgpa.toFixed(2);
            document.getElementById('total-credits').textContent = totalCredits;
            
            const resultsDiv = document.getElementById('results');
            resultsDiv.style.display = 'grid';

            const cgpaEl = document.getElementById('cgpa-value');
            cgpaEl.classList.remove('high', 'mid', 'low');
            
            let standing = "";
            if (cgpa >= 3.5) {
                cgpaEl.classList.add('high');
                standing = "Excellent 🌟";
            } else if (cgpa >= 2.5) {
                cgpaEl.classList.add('mid');
                standing = "Good 👍";
            } else {
                cgpaEl.classList.add('low');
                standing = "Needs Improvement ⚠️";
            }
            document.getElementById('standing').textContent = standing;
        }

        function resetForm() {
            document.getElementById('course-body').innerHTML = '';
            document.getElementById('results').style.display = 'none';
            addRow();
            addRow();
            addRow();
        }

        // Initialize with 3 rows
        window.onload = () => {
            addRow();
            addRow();
            addRow();
        };
    </script>
</body>
</html>
