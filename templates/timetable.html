<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Task Manager - Timetable</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: '#f8fafc',
                            surface: '#ffffff',
                            accent: '#2563eb',
                            acid: '#0284c7',
                        }
                    },
                    fontFamily: {
                        sans: ['"Inter"', 'sans-serif'],
                        mono: ['"Inter"', 'sans-serif'],
                    }
                }
            }
        }
                    },
                    fontFamily: {
                        mono: ['"Inter"', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #f8fafc;
            color: #0f172a;
            font-family: 'Inter', sans-serif;
        }

        .glass-widget {
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
        }

        .urgent-glow {
            box-shadow: 0 0 15px rgba(37, 99, 235, 0.2);
            border-color: rgba(37, 99, 235, 0.4);
        }

        /* Progress Ring */
        .progress-ring__circle {
            transition: stroke-dashoffset 0.35s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
            stroke: #2563eb;
        }
        
        .progress-ring__background {
            stroke: #e2e8f0;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #2563eb !important;
            box-shadow: 0 0 0 1px #2563eb;
        }
    </style>
</head>
<body class="h-screen w-full overflow-hidden p-4 md:p-8 flex flex-col gap-6">

    <header class="flex justify-between items-center px-2 relative z-50">
        <div class="flex items-center gap-4">
            <button id="menu-btn" class="focus:outline-none hover:text-brand-accent transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
            <h1 class="text-xl font-bold tracking-widest text-brand-accent hidden sm:block">SYS.TIMETABLE</h1>
        </div>
        <div class="flex items-center gap-4">
            <div class="text-xs uppercase tracking-widest text-brand-accent px-2 py-1 border border-slate-200 rounded bg-slate-50">USER: {{ username }}</div>
            <div class="text-sm opacity-50 hidden md:block" id="current-time"></div>
        </div>

        <div id="menu-dropdown" class="absolute top-10 left-2 w-48 bg-white border border-slate-200 rounded-lg shadow-2xl hidden flex-col z-50 overflow-hidden" style="backdrop-filter: blur(15px); background-color: rgba(10, 10, 11, 0.9);">
            <a href="/" class="px-4 py-3 text-sm hover:bg-slate-50 hover:text-brand-accent transition-colors border-b border-white/5">Dashboard</a>
            <a href="/timetable" class="px-4 py-3 text-sm hover:bg-slate-50 hover:text-brand-accent transition-colors border-b border-white/5">Timetable</a>
            <a href="/chat" class="px-4 py-3 text-sm hover:bg-slate-50 hover:text-brand-accent transition-colors border-b border-white/5">Assistant Chat</a>
            <a href="/reminder" class="px-4 py-3 text-sm hover:bg-slate-50 hover:text-brand-accent transition-colors border-b border-white/5">Set Reminder</a>
            <a href="/cgpa" class="px-4 py-3 text-sm hover:bg-slate-50 hover:text-brand-accent transition-colors border-b border-white/5">CGPA Calculator</a>
            <a href="/logout" class="px-4 py-3 text-sm hover:bg-red-500/20 text-red-400 transition-colors">Logout</a>
        </div>
    </header>

    <main class="flex-1 grid grid-cols-1 lg:grid-cols-3 gap-6 overflow-hidden">
        
        <!-- Add Class Form Widget -->
        <section class="glass-widget flex flex-col gap-6 lg:col-span-1 overflow-y-auto">
            <h2 class="text-sm tracking-wider uppercase opacity-70">Add New Class</h2>
            
            <form id="add-class-form" class="flex flex-col gap-4">
                <div>
                    <label class="text-xs opacity-50 uppercase mb-1 block">Day</label>
                    <select id="class-day" class="w-full bg-slate-50 border border-slate-200 rounded p-2 text-sm text-slate-800 focus:border-brand-accent transition-colors">
                        <option value="Monday" class="bg-brand-bg">Monday</option>
                        <option value="Tuesday" class="bg-brand-bg">Tuesday</option>
                        <option value="Wednesday" class="bg-brand-bg">Wednesday</option>
                        <option value="Thursday" class="bg-brand-bg">Thursday</option>
                        <option value="Friday" class="bg-brand-bg">Friday</option>
                        <option value="Saturday" class="bg-brand-bg">Saturday</option>
                        <option value="Sunday" class="bg-brand-bg">Sunday</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs opacity-50 uppercase mb-1 block">Subject / Course</label>
                    <input type="text" id="class-subject" required class="w-full bg-slate-50 border border-slate-200 rounded p-2 text-sm text-slate-800 focus:border-brand-accent transition-colors" placeholder="e.g. Data Structures">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs opacity-50 uppercase mb-1 block">Start Time</label>
                        <input type="time" id="class-start" required class="w-full bg-slate-50 border border-slate-200 rounded p-2 text-sm text-slate-800 focus:border-brand-accent transition-colors">
                    </div>
                    <div>
                        <label class="text-xs opacity-50 uppercase mb-1 block">End Time</label>
                        <input type="time" id="class-end" required class="w-full bg-slate-50 border border-slate-200 rounded p-2 text-sm text-slate-800 focus:border-brand-accent transition-colors">
                    </div>
                </div>
                <div>
                    <label class="text-xs opacity-50 uppercase mb-1 block">Room / Location</label>
                    <input type="text" id="class-room" class="w-full bg-slate-50 border border-slate-200 rounded p-2 text-sm text-slate-800 focus:border-brand-accent transition-colors" placeholder="e.g. Room 402">
                </div>
                <button type="submit" class="mt-4 w-full bg-brand-acid text-black font-bold py-2 rounded hover:bg-white transition-colors uppercase tracking-wider text-sm">Add to Timetable</button>
            </form>
        </section>

        <!-- Timetable View Widget -->
        <section class="glass-widget flex flex-col lg:col-span-2 overflow-hidden relative">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-4">
                <h2 class="text-sm tracking-wider uppercase opacity-70">Schedule Overview</h2>
                <button id="clear-btn" class="text-xs text-red-400 border border-red-400/30 px-3 py-1 rounded hover:bg-red-400/10 transition-colors uppercase">Clear Schedule</button>
            </div>
            
            <!-- Day Selector Tabs -->
            <div class="flex overflow-x-auto gap-2 pb-2 mb-4 border-b border-slate-200">
                <button class="day-btn active px-4 py-2 rounded text-sm transition-colors border border-transparent hover:border-slate-200 whitespace-nowrap" data-day="Monday">Mon</button>
                <button class="day-btn px-4 py-2 rounded text-sm transition-colors border border-transparent hover:border-slate-200 whitespace-nowrap" data-day="Tuesday">Tue</button>
                <button class="day-btn px-4 py-2 rounded text-sm transition-colors border border-transparent hover:border-slate-200 whitespace-nowrap" data-day="Wednesday">Wed</button>
                <button class="day-btn px-4 py-2 rounded text-sm transition-colors border border-transparent hover:border-slate-200 whitespace-nowrap" data-day="Thursday">Thu</button>
                <button class="day-btn px-4 py-2 rounded text-sm transition-colors border border-transparent hover:border-slate-200 whitespace-nowrap" data-day="Friday">Fri</button>
                <button class="day-btn px-4 py-2 rounded text-sm transition-colors border border-transparent hover:border-slate-200 whitespace-nowrap" data-day="Saturday">Sat</button>
                <button class="day-btn px-4 py-2 rounded text-sm transition-colors border border-transparent hover:border-slate-200 whitespace-nowrap" data-day="Sunday">Sun</button>
            </div>
            
            <div class="flex-1 overflow-y-auto pr-2 space-y-3" id="class-list">
                <!-- Classes will be injected here -->
            </div>
        </section>

    </main>

    <script>
        // Update Time
        function updateTime() {
            document.getElementById('current-time').innerText = new Date().toISOString().replace('T', ' ').substring(0, 19) + ' UTC';
        }
        setInterval(updateTime, 1000);
        updateTime();

        // Menu Dropdown
        const menuBtn = document.getElementById('menu-btn');
        const menuDropdown = document.getElementById('menu-dropdown');
        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            menuDropdown.classList.toggle('hidden');
            menuDropdown.classList.toggle('flex');
        });
        document.addEventListener('click', (e) => {
            if (!menuDropdown.classList.contains('hidden') && !menuDropdown.contains(e.target)) {
                menuDropdown.classList.add('hidden');
                menuDropdown.classList.remove('flex');
            }
        });

        // Timetable Logic
        let timetableData = {
            "Monday": [], "Tuesday": [], "Wednesday": [], 
            "Thursday": [], "Friday": [], "Saturday": [], "Sunday": []
        };
        let currentDay = "Monday";

        // Fetch Data
        async function fetchTimetable() {
            try {
                const res = await fetch('/api/timetable');
                const data = await res.json();
                if (Array.isArray(data)) {
                    // Backwards compatibility or empty state
                } else if (Object.keys(data).length > 0) {
                    timetableData = Object.assign(timetableData, data);
                }
                renderClasses();
            } catch (err) {
                console.error("Failed to fetch timetable", err);
            }
        }

        async function saveTimetable() {
            try {
                await fetch('/api/timetable', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(timetableData)
                });
            } catch (err) {
                console.error("Failed to save timetable", err);
            }
        }

        // Add Class
        document.getElementById('add-class-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const day = document.getElementById('class-day').value;
            const subject = document.getElementById('class-subject').value;
            const start = document.getElementById('class-start').value;
            const end = document.getElementById('class-end').value;
            const room = document.getElementById('class-room').value;

            if (!timetableData[day]) {
                timetableData[day] = [];
            }

            timetableData[day].push({
                id: Date.now(),
                subject,
                start,
                end,
                room
            });

            // Sort by start time
            timetableData[day].sort((a, b) => a.start.localeCompare(b.start));

            await saveTimetable();
            
            // Switch to the day the class was added to
            document.querySelector(`[data-day="${day}"]`).click();
            
            // Reset form
            document.getElementById('add-class-form').reset();
            document.getElementById('class-day').value = day;
        });

        // Delete Class
        window.deleteClass = async function(day, id) {
            if (timetableData[day]) {
                timetableData[day] = timetableData[day].filter(c => c.id !== id);
                await saveTimetable();
                renderClasses();
            }
        }

        // Clear Schedule
        document.getElementById('clear-btn').addEventListener('click', async () => {
            if(confirm("Are you sure you want to clear your entire schedule?")) {
                timetableData = {
                    "Monday": [], "Tuesday": [], "Wednesday": [], 
                    "Thursday": [], "Friday": [], "Saturday": [], "Sunday": []
                };
                await saveTimetable();
                renderClasses();
            }
        });

        // Tabs
        document.querySelectorAll('.day-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentDay = e.target.getAttribute('data-day');
                renderClasses();
            });
        });

        function renderClasses() {
            const list = document.getElementById('class-list');
            list.innerHTML = '';
            
            const classes = timetableData[currentDay] || [];

            if (classes.length === 0) {
                list.innerHTML = `
                    <div class="h-full flex items-center justify-center text-sm opacity-50 uppercase tracking-widest mt-10">
                        No classes scheduled
                    </div>
                `;
                return;
            }

            classes.forEach(c => {
                const el = document.createElement('div');
                el.className = 'p-4 rounded-lg bg-slate-50 border border-slate-200 flex flex-col sm:flex-row justify-between items-start sm:items-center transition-all hover:bg-slate-100 gap-4';
                
                el.innerHTML = `
                    <div class="flex-1">
                        <div class="font-bold text-base text-brand-accent mb-1">${c.subject}</div>
                        <div class="text-xs opacity-70 flex items-center gap-4">
                            <span class="flex items-center gap-1">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                ${c.start} - ${c.end}
                            </span>
                            ${c.room ? `
                            <span class="flex items-center gap-1 text-brand-accent">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
                                ${c.room}
                            </span>` : ''}
                        </div>
                    </div>
                    <button onclick="deleteClass('${currentDay}', ${c.id})" class="text-slate-800/30 hover:text-red-400 transition-colors self-end sm:self-auto p-2 focus:outline-none">
                        ✕
                    </button>
                `;
                list.appendChild(el);
            });
        }

        // Init
        // Set today as active day
        const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
        const todayStr = days[new Date().getDay()];
        const todayBtn = document.querySelector(`[data-day="${todayStr}"]`);
        if (todayBtn) {
            todayBtn.click();
        }

        fetchTimetable();
    </script>
</body>
</html>
