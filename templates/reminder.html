<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Reminder | Academic Task Manager</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: '#f8fafc',
                            surface: '#ffffff',
                            accent: '#2563eb',
                            acid: '#0284c7',
                        }
                    },
                    fontFamily: {
                        sans: ['"Inter"', 'sans-serif'],
                        mono: ['"Inter"', 'sans-serif'],
                    }
                }
            }
        }
                    },
                    fontFamily: {
                        mono: ['"Inter"', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #f8fafc;
            color: #0f172a;
            font-family: 'Inter', sans-serif;
        }

        .glass-widget {
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
        }

        .urgent-glow {
            box-shadow: 0 0 15px rgba(37, 99, 235, 0.2);
            border-color: rgba(37, 99, 235, 0.4);
        }

        /* Progress Ring */
        .progress-ring__circle {
            transition: stroke-dashoffset 0.35s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
            stroke: #2563eb;
        }
        
        .progress-ring__background {
            stroke: #e2e8f0;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #2563eb !important;
            box-shadow: 0 0 0 1px #2563eb;
        }
    </style>
</head>
<body class="min-h-screen w-full flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-md">
        <a href="/" class="text-brand-accent text-sm mb-6 inline-block hover:opacity-80 transition-opacity">← Back to Dashboard</a>
        
        <div class="glass-widget">
            <h1 class="text-2xl font-bold tracking-widest text-brand-accent mb-6">SET REMINDER</h1>
            
            <form id="reminder-form" class="flex flex-col gap-5">
                <div>
                    <label class="block text-xs uppercase opacity-70 mb-2 tracking-widest">Task Title</label>
                    <input type="text" id="title" class="w-full p-3 rounded-lg text-sm" placeholder="e.g. Algorithms Quiz" required>
                </div>
                
                <div>
                    <label class="block text-xs uppercase opacity-70 mb-2 tracking-widest">Date & Time</label>
                    <input type="datetime-local" id="datetime" class="w-full p-3 rounded-lg text-sm" required>
                </div>

                <div>
                    <label class="block text-xs uppercase opacity-70 mb-2 tracking-widest">Task Type</label>
                    <select id="category" class="w-full p-3 rounded-lg text-sm">
                        <option value="Assignment">Assignment</option>
                        <option value="Project">Project</option>
                        <option value="Study">Study</option>
                        <option value="Exam">Exam</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs uppercase opacity-70 mb-2 tracking-widest">Description</label>
                    <textarea id="description" rows="3" class="w-full p-3 rounded-lg text-sm bg-slate-50 border border-slate-200 text-slate-800 focus:border-brand-accent focus:outline-none transition-colors" placeholder="Task details..."></textarea>
                </div>

                <div>
                    <label class="block text-xs uppercase opacity-70 mb-2 tracking-widest">Priority</label>
                    <select id="priority" class="w-full p-3 rounded-lg text-sm">
                        <option value="Normal">Normal</option>
                        <option value="High">High</option>
                        <option value="Critical">Critical</option>
                    </select>
                </div>
                
                <button type="submit" class="mt-4 w-full p-3 bg-brand-accent text-slate-800 font-bold rounded-lg hover:bg-opacity-80 transition-colors uppercase tracking-widest text-sm">
                    Create Reminder
                </button>
            </form>
            
            <div id="success-msg" class="hidden mt-4 text-brand-accent text-sm text-center">
                Reminder successfully scheduled.
            </div>
        </div>
    </div>

    <script>
        document.getElementById('reminder-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const title = document.getElementById('title').value;
            const datetime = document.getElementById('datetime').value;
            const category = document.getElementById('category').value;
            const description = document.getElementById('description').value;
            const priority = document.getElementById('priority').value;
            
            // Format to ISO
            const dateObj = new Date(datetime);
            const isoString = dateObj.toISOString();
            
            try {
                await fetch('/api/tasks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: title,
                        description: description,
                        deadline: isoString,
                        category: category,
                        status: 'Active',
                        priority: priority
                    })
                });
                
                document.getElementById('success-msg').classList.remove('hidden');
                document.getElementById('reminder-form').reset();
                
                setTimeout(() => {
                    document.getElementById('success-msg').classList.add('hidden');
                }, 3000);
            } catch (err) {
                console.error("Error creating reminder", err);
            }
        });
    </script>
</body>
</html>
