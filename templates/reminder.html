<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Reminder | Academic Task Manager</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: '#0A0A0B',
                            surface: 'rgba(255, 255, 255, 0.03)',
                            accent: '#8B5CF6',
                            acid: '#A8FF35',
                        }
                    },
                    fontFamily: {
                        mono: ['"JetBrains Mono"', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0A0A0B;
            color: #ffffff;
            font-family: 'JetBrains Mono', monospace;
        }

        .glass-widget {
            background-color: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            padding: 2rem;
        }

        input, select {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: border-color 0.2s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #8B5CF6;
        }
    </style>
</head>
<body class="min-h-screen w-full flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-md">
        <a href="/" class="text-brand-acid text-sm mb-6 inline-block hover:opacity-80 transition-opacity">← Back to Dashboard</a>
        
        <div class="glass-widget">
            <h1 class="text-2xl font-bold tracking-widest text-brand-accent mb-6">SET REMINDER</h1>
            
            <form id="reminder-form" class="flex flex-col gap-5">
                <div>
                    <label class="block text-xs uppercase opacity-70 mb-2 tracking-widest">Task Title</label>
                    <input type="text" id="title" class="w-full p-3 rounded-lg text-sm" placeholder="e.g. Algorithms Quiz" required>
                </div>
                
                <div>
                    <label class="block text-xs uppercase opacity-70 mb-2 tracking-widest">Date & Time</label>
                    <input type="datetime-local" id="datetime" class="w-full p-3 rounded-lg text-sm" required>
                </div>

                <div>
                    <label class="block text-xs uppercase opacity-70 mb-2 tracking-widest">Task Type</label>
                    <select id="category" class="w-full p-3 rounded-lg text-sm">
                        <option value="Assignment">Assignment</option>
                        <option value="Project">Project</option>
                        <option value="Study">Study</option>
                        <option value="Exam">Exam</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs uppercase opacity-70 mb-2 tracking-widest">Description</label>
                    <textarea id="description" rows="3" class="w-full p-3 rounded-lg text-sm bg-white/5 border border-white/10 text-white focus:border-brand-accent focus:outline-none transition-colors" placeholder="Task details..."></textarea>
                </div>

                <div>
                    <label class="block text-xs uppercase opacity-70 mb-2 tracking-widest">Priority</label>
                    <select id="priority" class="w-full p-3 rounded-lg text-sm">
                        <option value="Normal">Normal</option>
                        <option value="High">High</option>
                        <option value="Critical">Critical</option>
                    </select>
                </div>
                
                <button type="submit" class="mt-4 w-full p-3 bg-brand-accent text-white font-bold rounded-lg hover:bg-opacity-80 transition-colors uppercase tracking-widest text-sm">
                    Create Reminder
                </button>
            </form>
            
            <div id="success-msg" class="hidden mt-4 text-brand-acid text-sm text-center">
                Reminder successfully scheduled.
            </div>
        </div>
    </div>

    <script>
        document.getElementById('reminder-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const title = document.getElementById('title').value;
            const datetime = document.getElementById('datetime').value;
            const category = document.getElementById('category').value;
            const description = document.getElementById('description').value;
            const priority = document.getElementById('priority').value;
            
            // Format to ISO
            const dateObj = new Date(datetime);
            const isoString = dateObj.toISOString();
            
            try {
                await fetch('/api/tasks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: title,
                        description: description,
                        deadline: isoString,
                        category: category,
                        status: 'Active',
                        priority: priority
                    })
                });
                
                document.getElementById('success-msg').classList.remove('hidden');
                document.getElementById('reminder-form').reset();
                
                setTimeout(() => {
                    document.getElementById('success-msg').classList.add('hidden');
                }, 3000);
            } catch (err) {
                console.error("Error creating reminder", err);
            }
        });
    </script>
</body>
</html>
