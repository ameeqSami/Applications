<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Academic Task Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: '#f8fafc',
                            surface: '#ffffff',
                            accent: '#2563eb',
                            acid: '#0284c7',
                        }
                    },
                    fontFamily: {
                        sans: ['"Inter"', 'sans-serif'],
                        mono: ['"Inter"', 'sans-serif'],
                    }
                }
            }
        }
                    },
                    fontFamily: {
                        mono: ['"Inter"', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #f8fafc;
            color: #0f172a;
            font-family: 'Inter', sans-serif;
        }

        .glass-widget {
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
        }

        .urgent-glow {
            box-shadow: 0 0 15px rgba(37, 99, 235, 0.2);
            border-color: rgba(37, 99, 235, 0.4);
        }

        /* Progress Ring */
        .progress-ring__circle {
            transition: stroke-dashoffset 0.35s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
            stroke: #2563eb;
        }
        
        .progress-ring__background {
            stroke: #e2e8f0;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #2563eb !important;
            box-shadow: 0 0 0 1px #2563eb;
        }
    </style>
</head>
<body class="min-h-screen w-full flex flex-col items-center justify-center p-4">
    <div class="w-full max-w-sm">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold tracking-widest text-brand-accent uppercase">Academic Dashboard</h1>
            <p class="text-xs uppercase tracking-widest opacity-50 mt-2">New Identity Registration</p>
        </div>
        
        <div class="glass-widget">
            <h2 class="text-xl font-bold tracking-widest text-brand-accent mb-6 uppercase">Create Account</h2>
            
            {% if error %}
            <div class="mb-4 p-3 rounded bg-red-500/20 border border-red-500/50 text-red-400 text-sm">
                {{ error }}
            </div>
            {% endif %}
            
            <form method="POST" action="/register" class="flex flex-col gap-5">
                <div>
                    <label class="block text-xs uppercase opacity-70 mb-2 tracking-widest">Select Username</label>
                    <input type="text" name="username" class="w-full p-3 rounded-lg text-sm" placeholder="Enter username" required autofocus>
                </div>
                <div>
                    <label class="block text-xs uppercase opacity-70 mb-2 tracking-widest">Create Password</label>
                    <input type="password" name="password" class="w-full p-3 rounded-lg text-sm" placeholder="Enter secure password" required>
                </div>
                <button type="submit" class="mt-4 w-full p-3 bg-brand-acid text-black font-bold rounded-lg hover:bg-opacity-80 transition-colors uppercase tracking-widest text-sm focus:outline-none">
                    Register Identity
                </button>
            </form>
            
            <div class="mt-6 text-center text-xs opacity-70">
                Already registered? <a href="/login" class="text-brand-accent hover:underline ml-1 focus:outline-none">Return to Login</a>
            </div>
        </div>
    </div>
</body>
</html>
