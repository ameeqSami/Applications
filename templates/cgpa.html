<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGPA Calculator | Academic Task Manager</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: '#f8fafc',
                            surface: '#ffffff',
                            accent: '#2563eb',
                            acid: '#0284c7',
                        }
                    },
                    fontFamily: {
                        sans: ['"Inter"', 'sans-serif'],
                        mono: ['"Inter"', 'sans-serif'],
                    }
                }
            }
        }
                    },
                    fontFamily: {
                        mono: ['"Inter"', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #f8fafc;
            color: #0f172a;
            font-family: 'Inter', sans-serif;
        }

        .glass-widget {
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
        }

        .urgent-glow {
            box-shadow: 0 0 15px rgba(37, 99, 235, 0.2);
            border-color: rgba(37, 99, 235, 0.4);
        }

        /* Progress Ring */
        .progress-ring__circle {
            transition: stroke-dashoffset 0.35s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
            stroke: #2563eb;
        }
        
        .progress-ring__background {
            stroke: #e2e8f0;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #2563eb !important;
            box-shadow: 0 0 0 1px #2563eb;
        }
    </style>
</head>
<body class="min-h-screen w-full flex flex-col p-4 md:p-8">
    <header class="flex items-center mb-8 gap-4 px-2">
        <a href="/" class="text-brand-accent text-sm hover:opacity-80 transition-opacity">← Back</a>
        <h1 class="text-xl font-bold tracking-widest text-brand-accent uppercase">CGPA Calculator</h1>
    </header>

    <main class="max-w-4xl w-full mx-auto flex flex-col gap-6">
        
        <div class="glass-widget">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-sm tracking-wider uppercase opacity-70">Course Details</h2>
                <button onclick="addRow()" class="px-4 py-2 border border-slate-200 rounded-lg text-xs tracking-widest uppercase hover:bg-slate-100 hover:border-brand-accent transition-all focus:outline-none">
                    + Add Course
                </button>
            </div>

            <div class="overflow-x-auto w-full">
                <table class="w-full text-left text-sm whitespace-nowrap">
                    <thead>
                        <tr class="text-xs uppercase tracking-widest opacity-50 border-b border-slate-200">
                            <th class="pb-3 px-2 w-1/2">Course Name</th>
                            <th class="pb-3 px-2 w-1/4">Credits</th>
                            <th class="pb-3 px-2 w-1/4">Grade</th>
                            <th class="pb-3 px-2"></th>
                        </tr>
                    </thead>
                    <tbody id="course-body" class="divide-y divide-white/5">
                        <!-- Rows injected via JS -->
                    </tbody>
                </table>
            </div>

            <div class="flex gap-4 mt-6 pt-4 border-t border-slate-200">
                <button onclick="calculateCGPA()" class="px-6 py-2 bg-brand-accent text-slate-800 font-bold rounded-lg hover:bg-opacity-80 transition-colors uppercase tracking-widest text-sm focus:outline-none">
                    Calculate Now
                </button>
                <button onclick="resetForm()" class="px-6 py-2 border border-slate-200 text-slate-800 rounded-lg hover:bg-slate-100 transition-colors uppercase tracking-widest text-sm focus:outline-none">
                    Reset
                </button>
            </div>
        </div>

        <div id="results" class="glass-widget hidden grid-cols-1 md:grid-cols-3 gap-6 text-center animate-fade-in">
            <div class="flex flex-col items-center">
                <div class="text-xs uppercase tracking-widest opacity-50 mb-2">Current CGPA</div>
                <div id="cgpa-value" class="text-4xl font-bold text-brand-accent">0.00</div>
            </div>
            <div class="flex flex-col items-center">
                <div class="text-xs uppercase tracking-widest opacity-50 mb-2">Total Credits</div>
                <div id="total-credits" class="text-4xl font-bold text-slate-800">0</div>
            </div>
            <div class="flex flex-col items-center">
                <div class="text-xs uppercase tracking-widest opacity-50 mb-2">Standing</div>
                <div id="standing" class="text-xl font-bold text-brand-accent mt-2">-</div>
            </div>
        </div>

    </main>

    <script>
        const gradeScale = {
            'A': 4.0, 'A-': 3.7, 'B+': 3.3, 'B': 3.0, 'B-': 2.7,
            'C+': 2.3, 'C': 2.0, 'C-': 1.7, 'D+': 1.3, 'D': 1.0, 'F': 0.0
        };

        function addRow() {
            const tbody = document.getElementById('course-body');
            const row = document.createElement('tr');
            row.className = "hover:bg-slate-50 transition-colors";
            
            const selectOptions = Object.keys(gradeScale).map(g => `<option value="${g}">${g}</option>`).join('');
            
            row.innerHTML = `
                <td class="py-3 px-2">
                    <input type="text" placeholder="e.g. Algorithms" class="w-full p-2 rounded text-sm placeholder-slate-400 course-name">
                </td>
                <td class="py-3 px-2">
                    <input type="number" step="0.5" min="0" value="3.0" class="w-full p-2 rounded text-sm course-credits">
                </td>
                <td class="py-3 px-2">
                    <select class="w-full p-2 rounded text-sm course-grade">
                        ${selectOptions}
                    </select>
                </td>
                <td class="py-3 px-2 text-right">
                    <button class="w-8 h-8 rounded border border-slate-200 text-slate-800/50 hover:bg-red-500/20 hover:text-red-400 hover:border-red-400/50 transition-all focus:outline-none flex items-center justify-center" onclick="removeRow(this)">
                        ✕
                    </button>
                </td>
            `;
            tbody.appendChild(row);
        }

        function removeRow(btn) {
            btn.closest('tr').remove();
        }

        function calculateCGPA() {
            const credits = document.querySelectorAll('.course-credits');
            const grades = document.querySelectorAll('.course-grade');
            
            let totalPoints = 0;
            let totalCredits = 0;

            for (let i = 0; i < credits.length; i++) {
                const c = parseFloat(credits[i].value) || 0;
                const g = gradeScale[grades[i].value];
                totalPoints += (c * g);
                totalCredits += c;
            }

            const cgpa = totalCredits > 0 ? (totalPoints / totalCredits) : 0;
            
            const cgpaEl = document.getElementById('cgpa-value');
            cgpaEl.textContent = cgpa.toFixed(2);
            document.getElementById('total-credits').textContent = totalCredits;
            
            const resultsDiv = document.getElementById('results');
            resultsDiv.classList.remove('hidden');
            resultsDiv.classList.add('grid');

            // Cyber theme color mapping
            cgpaEl.className = 'text-4xl font-bold';
            let standing = "";
            if (cgpa >= 3.5) {
                cgpaEl.classList.add('text-brand-accent');
                standing = "Excellent";
            } else if (cgpa >= 2.5) {
                cgpaEl.classList.add('text-yellow-400');
                standing = "Good";
            } else {
                cgpaEl.classList.add('text-red-400');
                standing = "Needs Improvement";
            }
            document.getElementById('standing').textContent = standing;
        }

        function resetForm() {
            document.getElementById('course-body').innerHTML = '';
            const resultsDiv = document.getElementById('results');
            resultsDiv.classList.add('hidden');
            resultsDiv.classList.remove('grid');
            addRow();
            addRow();
            addRow();
        }

        // Initialize with 3 rows
        window.onload = () => {
            resetForm();
        };
    </script>
</body>
</html>
