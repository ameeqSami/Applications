<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Task Manager</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: '#f8fafc',
                            surface: '#ffffff',
                            accent: '#2563eb',
                            acid: '#0284c7',
                        }
                    },
                    fontFamily: {
                        sans: ['"Inter"', 'sans-serif'],
                        mono: ['"Inter"', 'sans-serif'],
                    }
                }
            }
        }
                    },
                    fontFamily: {
                        mono: ['"Inter"', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #f8fafc;
            color: #0f172a;
            font-family: 'Inter', sans-serif;
        }

        .glass-widget {
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
        }

        .urgent-glow {
            box-shadow: 0 0 15px rgba(37, 99, 235, 0.2);
            border-color: rgba(37, 99, 235, 0.4);
        }

        /* Progress Ring */
        .progress-ring__circle {
            transition: stroke-dashoffset 0.35s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
            stroke: #2563eb;
        }
        
        .progress-ring__background {
            stroke: #e2e8f0;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #2563eb !important;
            box-shadow: 0 0 0 1px #2563eb;
        }
    </style>
</head>
<body class="h-screen w-full overflow-hidden p-4 md:p-8 flex flex-col gap-6">

    <header class="flex justify-between items-center px-2 relative z-50">
        <div class="flex items-center gap-4">
            <button id="menu-btn" class="focus:outline-none hover:text-brand-accent transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
            <h1 class="text-xl font-bold tracking-widest text-brand-accent hidden sm:block">Academic Dashboard</h1>
        </div>
        <div class="flex items-center gap-4">
            <div class="text-xs uppercase tracking-widest text-brand-accent px-2 py-1 border border-slate-200 rounded bg-slate-50">USER: {{ username }}</div>
            <div class="text-sm opacity-50 hidden md:block" id="current-time"></div>
        </div>

        <div id="menu-dropdown" class="absolute top-10 left-2 w-48 bg-white border border-slate-200 rounded-lg shadow-2xl hidden flex-col z-50 overflow-hidden" style="backdrop-filter: blur(15px); background-color: rgba(10, 10, 11, 0.9);">
            <a href="/" class="px-4 py-3 text-sm hover:bg-slate-50 hover:text-brand-accent transition-colors border-b border-white/5">Dashboard</a>
            <a href="/timetable" class="px-4 py-3 text-sm hover:bg-slate-50 hover:text-brand-accent transition-colors border-b border-white/5">Timetable</a>
            <a href="/chat" class="px-4 py-3 text-sm hover:bg-slate-50 hover:text-brand-accent transition-colors border-b border-white/5">Assistant Chat</a>
            <a href="/reminder" class="px-4 py-3 text-sm hover:bg-slate-50 hover:text-brand-accent transition-colors border-b border-white/5">Set Reminder</a>
            <a href="/cgpa" class="px-4 py-3 text-sm hover:bg-slate-50 hover:text-brand-accent transition-colors border-b border-white/5">CGPA Calculator</a>
            <a href="/logout" class="px-4 py-3 text-sm hover:bg-red-500/20 text-red-400 transition-colors">Logout</a>
        </div>
    </header>

    <main class="flex-1 grid grid-cols-1 lg:grid-cols-4 gap-6 overflow-hidden">
        
        <!-- Widget A (The Pulse) -->
        <section class="glass-widget flex flex-col gap-6 lg:col-span-1 overflow-y-auto">
            <h2 class="text-sm tracking-wider uppercase opacity-70">The Pulse</h2>
            
            <div class="flex items-center justify-between">
                <div>
                    <div class="text-4xl font-bold mb-1" id="tasks-today">0</div>
                    <div class="text-xs opacity-50">Tasks Due Today</div>
                </div>
                
                <!-- System Progress Ring -->
                <div class="relative w-24 h-24">
                    <svg class="w-full h-full" viewBox="0 0 100 100">
                        <circle class="progress-ring__background" stroke-width="8" fill="transparent" r="40" cx="50" cy="50"/>
                        <circle class="progress-ring__circle" stroke-width="8" stroke-linecap="round" fill="transparent" r="40" cx="50" cy="50" stroke-dasharray="251.2" stroke-dashoffset="251.2" id="progress-circle"/>
                    </svg>
                    <div class="absolute inset-0 flex items-center justify-center">
                        <span class="text-sm font-bold" id="progress-text">0%</span>
                    </div>
                </div>
            </div>

            <div class="mt-4">
                <div class="text-xs mb-2 opacity-50 uppercase tracking-widest">Stats Overview</div>
                <div class="flex justify-between items-center text-sm mb-1">
                    <span>Active</span>
                    <span id="stat-active" class="text-brand-accent">0</span>
                </div>
                <div class="flex justify-between items-center text-sm mb-1">
                    <span>Completed</span>
                    <span id="stat-completed" class="opacity-70">0</span>
                </div>
                <div class="flex justify-between items-center text-sm">
                    <span>Overdue</span>
                    <span id="stat-overdue" class="text-red-400">0</span>
                </div>
            </div>
        </section>

        <!-- Widget B (Chronos Timeline) -->
        <section class="glass-widget flex flex-col lg:col-span-2 overflow-hidden">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-sm tracking-wider uppercase opacity-70">Chronos Timeline</h2>
                <button onclick="openCreateReminderModal()" class="text-brand-accent hover:text-slate-800 transition-colors focus:outline-none" title="Add Reminder">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                    </svg>
                </button>
            </div>
            
            <div class="flex-1 overflow-y-auto pr-2 space-y-4" id="task-list">
                <!-- Tasks will be injected here -->
            </div>
        </section>

        <!-- Widget D (Quick Todo List) -->
        <section class="glass-widget flex flex-col lg:col-span-1 overflow-hidden">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-sm tracking-wider uppercase opacity-70">Quick List</h2>
                <button onclick="openCreateQuickTodoModal()" class="text-brand-accent hover:text-slate-800 transition-colors focus:outline-none">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                    </svg>
                </button>
            </div>
            
            <div class="flex-1 overflow-y-auto pr-2 space-y-2" id="quick-todo-list">
                <!-- Simple todos will be injected here -->
            </div>
        </section>

    </main>

    <!-- Widget C (Quick-Input Terminal) -->
    <section class="glass-widget flex items-center p-4">
        <span class="text-brand-accent mr-3">❯</span>
        <input type="text" id="terminal-input" class="w-full bg-transparent border-none text-sm placeholder-slate-400" placeholder="Task String (e.g., DSA Quiz, 2026-05-20, High)... Press Enter to submit" autocomplete="off">
    </section>

    <!-- Create Reminder Modal -->
    <div id="create-reminder-modal" class="fixed inset-0 z-[110] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeCreateReminderModal()"></div>
        <div class="glass-widget relative w-full max-w-md shadow-2xl flex flex-col gap-4 border border-slate-200">
            <button onclick="closeCreateReminderModal()" class="absolute top-4 right-4 text-slate-800/50 hover:text-slate-800 transition-colors focus:outline-none">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            
            <h2 class="text-xl font-bold tracking-widest text-brand-accent mb-2">NEW REMINDER</h2>
            
            <form id="popup-reminder-form" class="flex flex-col gap-4">
                <div>
                    <input type="text" id="popup-title" class="w-full bg-white border border-slate-200 rounded px-3 py-2 text-sm placeholder-slate-400 focus:border-brand-accent transition-colors text-slate-800" placeholder="Task Title" required>
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <select id="popup-category" class="w-full bg-white border border-slate-200 rounded px-3 py-2 text-sm focus:border-brand-accent transition-colors text-slate-800">
                        <option value="Assignment">Assignment</option>
                        <option value="Project">Project</option>
                        <option value="Study" selected>Study</option>
                        <option value="Exam">Exam</option>
                        <option value="Other">Other</option>
                    </select>
                    
                    <select id="popup-priority" class="w-full bg-white border border-slate-200 rounded px-3 py-2 text-sm focus:border-brand-accent transition-colors text-slate-800">
                        <option value="Normal" selected>Normal</option>
                        <option value="High">High</option>
                        <option value="Critical">Critical</option>
                    </select>
                </div>

                <div>
                    <input type="datetime-local" id="popup-datetime" class="w-full bg-white border border-slate-200 rounded px-3 py-2 text-sm focus:border-brand-accent transition-colors text-slate-800" required>
                </div>
                
                <div>
                    <textarea id="popup-description" rows="3" class="w-full bg-white border border-slate-200 rounded px-3 py-2 text-sm placeholder-slate-400 focus:border-brand-accent transition-colors text-slate-800" placeholder="Description..."></textarea>
                </div>
                
                <button type="submit" class="w-full p-2 mt-2 bg-brand-accent text-slate-800 font-bold rounded hover:bg-opacity-80 transition-colors uppercase tracking-widest text-sm">
                    Create Reminder
                </button>
            </form>
        </div>
    </div>

    <!-- Create Quick Todo Modal -->
    <div id="create-quick-todo-modal" class="fixed inset-0 z-[110] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeCreateQuickTodoModal()"></div>
        <div class="glass-widget relative w-full max-w-sm shadow-2xl flex flex-col gap-4 border border-slate-200">
            <button onclick="closeCreateQuickTodoModal()" class="absolute top-4 right-4 text-slate-800/50 hover:text-slate-800 transition-colors focus:outline-none">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            
            <h2 class="text-lg font-bold tracking-widest text-brand-accent mb-2">QUICK TODO</h2>
            
            <form id="popup-quick-todo-form" class="flex flex-col gap-4">
                <div>
                    <input type="text" id="popup-quick-title" class="w-full bg-white border border-slate-200 rounded px-3 py-2 text-sm placeholder-slate-400 focus:border-brand-accent transition-colors text-slate-800" placeholder="Task Title" required>
                </div>
                <div>
                    <textarea id="popup-quick-desc" rows="2" class="w-full bg-white border border-slate-200 rounded px-3 py-2 text-sm placeholder-slate-400 focus:border-brand-accent transition-colors text-slate-800" placeholder="Description (Optional)"></textarea>
                </div>
                <button type="submit" class="w-full p-2 mt-2 bg-blue-100 text-brand-accent font-bold rounded hover:bg-opacity-80 transition-colors uppercase tracking-widest text-sm">
                    Add Task
                </button>
            </form>
        </div>
    </div>

    <!-- Task Modal -->
    <div id="task-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeTaskModal()"></div>
        <div class="glass-widget relative w-full max-w-lg shadow-2xl flex flex-col gap-4 border border-slate-200">
            <button onclick="closeTaskModal()" class="absolute top-4 right-4 text-slate-800/50 hover:text-slate-800 transition-colors focus:outline-none">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <div class="flex items-center gap-3 pr-8">
                <span id="modal-category" class="text-xs uppercase tracking-widest text-brand-accent px-2 py-1 border border-slate-200 rounded bg-slate-50"></span>
                <span id="modal-priority" class="text-xs uppercase tracking-widest px-2 py-1 border border-slate-200 rounded bg-slate-50"></span>
            </div>
            <h2 id="modal-title" class="text-xl md:text-2xl font-bold tracking-wider text-brand-accent"></h2>
            <div class="text-sm opacity-60 flex gap-2 items-center">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span id="modal-deadline"></span>
            </div>
            <div class="bg-white p-4 rounded-lg border border-white/5 min-h-[100px] mt-2 max-h-[40vh] overflow-y-auto">
                <p id="modal-description" class="text-sm text-slate-800/80 whitespace-pre-wrap leading-relaxed"></p>
            </div>
        </div>
    </div>

    <script>
        let allTasks = [];

        // Update Time
        function updateTime() {
            document.getElementById('current-time').innerText = new Date().toISOString().replace('T', ' ').substring(0, 19) + ' UTC';
        }
        setInterval(updateTime, 1000);
        updateTime();

        // Menu Dropdown
        const menuBtn = document.getElementById('menu-btn');
        const menuDropdown = document.getElementById('menu-dropdown');
        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            menuDropdown.classList.toggle('hidden');
            menuDropdown.classList.toggle('flex');
        });
        document.addEventListener('click', (e) => {
            if (!menuDropdown.classList.contains('hidden') && !menuDropdown.contains(e.target)) {
                menuDropdown.classList.add('hidden');
                menuDropdown.classList.remove('flex');
            }
        });

        // Fetch Tasks
        async function fetchTasks() {
            try {
                const res = await fetch('/api/tasks');
                const tasks = await res.json();
                allTasks = tasks;
                renderTasks(tasks);
                updatePulse(tasks);
            } catch (err) {
                console.error("Failed to fetch tasks", err);
            }
        }

        function renderTasks(tasks) {
            const list = document.getElementById('task-list');
            list.innerHTML = '';
            
            tasks.forEach(task => {
                const isUrgent = task.urgency_flag;
                const isOverdue = task.status === 'Overdue';
                const isCompleted = task.status === 'Completed';
                
                const glowClass = (isUrgent && !isCompleted && !isOverdue) ? 'urgent-glow' : '';
                const opacityClass = isCompleted ? 'opacity-40 line-through' : '';
                const statusColor = isOverdue ? 'text-red-400' : (isCompleted ? 'text-gray-400' : 'text-brand-accent');
                
                // Format deadline beautifully
                const dateObj = new Date(task.deadline);
                const dateStr = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                const timeStr = dateObj.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

                const el = document.createElement('div');
                el.className = `p-4 rounded-lg bg-slate-50 border border-slate-200 flex justify-between items-center transition-all hover:bg-slate-100 cursor-pointer ${glowClass} ${opacityClass}`;
                el.onclick = () => openTaskModal(task.id);
                
                el.innerHTML = `
                    <div class="flex items-center gap-4">
                        <button onclick="event.stopPropagation(); toggleComplete(${task.id}, '${task.status}')" class="w-5 h-5 rounded border border-slate-300 flex items-center justify-center hover:border-brand-accent transition-colors focus:outline-none">
                            ${isCompleted ? '<div class="w-3 h-3 bg-brand-acid rounded-sm"></div>' : ''}
                        </button>
                        <div>
                            <div class="font-bold text-sm md:text-base">${task.title}</div>
                            ${task.description ? `<div class="text-xs mt-1 text-slate-800/70 truncate max-w-[200px] sm:max-w-xs">${task.description}</div>` : ''}
                            <div class="text-xs opacity-60 flex gap-3 mt-1">
                                <span>[${task.category}]</span>
                                <span>DL: ${dateStr} ${timeStr}</span>
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center gap-4 text-xs">
                        <div class="hidden md:block">
                            <span class="px-2 py-1 rounded bg-slate-50 border border-slate-200 uppercase tracking-wide ${task.priority === 'High' || task.priority === 'Critical' ? 'text-brand-accent' : ''}">${task.priority}</span>
                        </div>
                        <div class="${statusColor} uppercase tracking-wider w-20 text-right">${task.status}</div>
                        <button onclick="event.stopPropagation(); deleteTask(${task.id})" class="text-slate-800/30 hover:text-red-400 transition-colors ml-2 focus:outline-none">
                            ✕
                        </button>
                    </div>
                `;
                list.appendChild(el);
            });
        }

        function updatePulse(tasks) {
            let total = tasks.length;
            let completed = 0;
            let active = 0;
            let overdue = 0;
            let dueToday = 0;

            const todayStr = new Date().toISOString().substring(0, 10);

            tasks.forEach(t => {
                if (t.status === 'Completed') completed++;
                else if (t.status === 'Overdue') overdue++;
                else active++;

                if (t.deadline.startsWith(todayStr) && t.status !== 'Completed') {
                    dueToday++;
                }
            });

            document.getElementById('stat-active').innerText = active;
            document.getElementById('stat-completed').innerText = completed;
            document.getElementById('stat-overdue').innerText = overdue;
            document.getElementById('tasks-today').innerText = dueToday;

            // Progress Ring
            const percent = total === 0 ? 0 : Math.round((completed / total) * 100);
            const circle = document.getElementById('progress-circle');
            const circumference = 2 * Math.PI * 40; // r=40
            const offset = circumference - (percent / 100) * circumference;
            circle.style.strokeDashoffset = offset;
            document.getElementById('progress-text').innerText = `${percent}%`;
        }

        // Actions
        async function toggleComplete(id, currentStatus) {
            const newStatus = currentStatus === 'Completed' ? 'Active' : 'Completed';
            await fetch(`/api/tasks/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: newStatus })
            });
            fetchTasks();
        }

        async function deleteTask(id) {
            await fetch(`/api/tasks/${id}`, { method: 'DELETE' });
            fetchTasks();
        }

        // Task Modal Logic
        function openTaskModal(taskId) {
            const task = allTasks.find(t => t.id === taskId);
            if (!task) return;
            
            document.getElementById('modal-category').parentElement.classList.remove('hidden');
            document.getElementById('modal-deadline').parentElement.classList.remove('hidden');
            
            document.getElementById('modal-title').innerText = task.title;
            document.getElementById('modal-category').innerText = task.category;
            
            const priorityEl = document.getElementById('modal-priority');
            priorityEl.innerText = task.priority;
            priorityEl.className = `text-xs uppercase tracking-widest px-2 py-1 border border-slate-200 rounded bg-slate-50 ${task.priority === 'High' || task.priority === 'Critical' ? 'text-brand-accent' : ''}`;
            
            const dateObj = new Date(task.deadline);
            document.getElementById('modal-deadline').innerText = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) + ' ' + dateObj.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            
            const descEl = document.getElementById('modal-description');
            descEl.innerText = task.description || 'No description provided.';
            if (!task.description) {
                descEl.classList.add('opacity-50', 'italic');
            } else {
                descEl.classList.remove('opacity-50', 'italic');
            }
            
            document.getElementById('task-modal').classList.remove('hidden');
        }

        function openQuickTodoModal(index) {
            const todo = quickTodos[index];
            if (!todo) return;
            
            document.getElementById('modal-category').parentElement.classList.add('hidden');
            document.getElementById('modal-deadline').parentElement.classList.add('hidden');
            
            document.getElementById('modal-title').innerText = todo.text;
            
            const descEl = document.getElementById('modal-description');
            descEl.innerText = todo.description || 'No description provided.';
            if (!todo.description) {
                descEl.classList.add('opacity-50', 'italic');
            } else {
                descEl.classList.remove('opacity-50', 'italic');
            }
            
            document.getElementById('task-modal').classList.remove('hidden');
        }

        function closeTaskModal() {
            document.getElementById('task-modal').classList.add('hidden');
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (!document.getElementById('task-modal').classList.contains('hidden')) {
                    closeTaskModal();
                }
                if (!document.getElementById('create-reminder-modal').classList.contains('hidden')) {
                    closeCreateReminderModal();
                }
                if (!document.getElementById('create-quick-todo-modal').classList.contains('hidden')) {
                    closeCreateQuickTodoModal();
                }
            }
        });

        // Create Reminder Modal Logic
        function openCreateReminderModal() {
            document.getElementById('create-reminder-modal').classList.remove('hidden');
        }

        function closeCreateReminderModal() {
            document.getElementById('create-reminder-modal').classList.add('hidden');
            document.getElementById('popup-reminder-form').reset();
        }

        document.getElementById('popup-reminder-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const title = document.getElementById('popup-title').value;
            const datetime = document.getElementById('popup-datetime').value;
            const category = document.getElementById('popup-category').value;
            const description = document.getElementById('popup-description').value;
            const priority = document.getElementById('popup-priority').value;
            
            const dateObj = new Date(datetime);
            const isoString = dateObj.toISOString();
            
            try {
                await fetch('/api/tasks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: title,
                        description: description,
                        deadline: isoString,
                        category: category,
                        status: 'Active',
                        priority: priority
                    })
                });
                
                closeCreateReminderModal();
                fetchTasks();
            } catch (err) {
                console.error("Error creating reminder", err);
            }
        });

        // Terminal Input
        document.getElementById('terminal-input').addEventListener('keydown', async function(e) {
            if (e.key === 'Enter' && this.value.trim() !== '') {
                const val = this.value.trim();
                this.value = '';
                this.disabled = true;
                await fetch('/api/tasks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ task_string: val })
                });
                this.disabled = false;
                this.focus();
                fetchTasks();
            }
        });

        // Quick Todo List Logic (Local Storage)
        const quickTodoBtn = document.getElementById('add-quick-todo-btn');
        const quickTodoInputContainer = document.getElementById('quick-todo-input-container');
        const quickTodoInput = document.getElementById('quick-todo-input');
        const quickTodoList = document.getElementById('quick-todo-list');
        
        let quickTodos = JSON.parse(localStorage.getItem('quickTodos')) || [];

        function renderQuickTodos() {
            quickTodoList.innerHTML = '';
            quickTodos.forEach((todo, index) => {
                const el = document.createElement('div');
                el.className = `flex flex-col p-2 rounded bg-slate-50 border border-slate-200 group cursor-pointer hover:bg-slate-100 transition-colors ${todo.completed ? 'opacity-50' : ''}`;
                el.onclick = () => openQuickTodoModal(index);
                
                el.innerHTML = `
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-3 overflow-hidden">
                            <button onclick="event.stopPropagation(); toggleQuickTodo(${index})" class="min-w-[16px] w-4 h-4 rounded-sm border border-slate-300 flex items-center justify-center hover:border-brand-accent transition-colors focus:outline-none">
                                ${todo.completed ? '<div class="w-2 h-2 bg-brand-acid rounded-sm"></div>' : ''}
                            </button>
                            <span class="text-sm truncate font-bold ${todo.completed ? 'line-through' : ''}">${todo.text}</span>
                        </div>
                        <button onclick="event.stopPropagation(); deleteQuickTodo(${index})" class="text-slate-800/20 hover:text-red-400 transition-colors opacity-0 group-hover:opacity-100 focus:opacity-100 focus:outline-none">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>
                    </div>
                    ${todo.description ? `<div class="text-xs text-slate-800/50 ml-7 mt-1 truncate max-w-[180px] sm:max-w-[220px]">${todo.description}</div>` : ''}
                `;
                quickTodoList.appendChild(el);
            });
        }

        function openCreateQuickTodoModal() {
            document.getElementById('create-quick-todo-modal').classList.remove('hidden');
            document.getElementById('popup-quick-title').focus();
        }

        function closeCreateQuickTodoModal() {
            document.getElementById('create-quick-todo-modal').classList.add('hidden');
            document.getElementById('popup-quick-todo-form').reset();
        }

        document.getElementById('popup-quick-todo-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const title = document.getElementById('popup-quick-title').value.trim();
            const desc = document.getElementById('popup-quick-desc').value.trim();
            
            if (title !== '') {
                quickTodos.push({ text: title, description: desc, completed: false });
                localStorage.setItem('quickTodos', JSON.stringify(quickTodos));
                renderQuickTodos();
                closeCreateQuickTodoModal();
            }
        });

        window.toggleQuickTodo = (index) => {
            quickTodos[index].completed = !quickTodos[index].completed;
            localStorage.setItem('quickTodos', JSON.stringify(quickTodos));
            renderQuickTodos();
        };

        window.deleteQuickTodo = (index) => {
            quickTodos.splice(index, 1);
            localStorage.setItem('quickTodos', JSON.stringify(quickTodos));
            renderQuickTodos();
        };

        renderQuickTodos();

        // Init
        fetchTasks();
    </script>
</body>
</html>
