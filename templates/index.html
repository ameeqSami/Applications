<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Task Manager</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: '#0A0A0B',
                            surface: 'rgba(255, 255, 255, 0.03)',
                            accent: '#8B5CF6',
                            acid: '#A8FF35',
                        }
                    },
                    fontFamily: {
                        mono: ['"JetBrains Mono"', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0A0A0B;
            color: #ffffff;
            font-family: 'JetBrains Mono', monospace;
        }

        .glass-widget {
            background-color: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            padding: 1.5rem;
        }

        .urgent-glow {
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.4);
            border-color: rgba(139, 92, 246, 0.6);
        }

        /* Progress Ring */
        .progress-ring__circle {
            transition: stroke-dashoffset 0.35s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
            stroke: #A8FF35;
        }
        
        .progress-ring__background {
            stroke: rgba(255, 255, 255, 0.1);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent; 
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2); 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3); 
        }
        
        input:focus {
            outline: none;
        }
    </style>
</head>
<body class="h-screen w-full overflow-hidden p-4 md:p-8 flex flex-col gap-6">

    <header class="flex justify-between items-center px-2 relative z-50">
        <div class="flex items-center gap-4">
            <button id="menu-btn" class="focus:outline-none hover:text-brand-acid transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
            <h1 class="text-xl font-bold tracking-widest text-brand-acid hidden sm:block">SYS.TASK_MANAGER</h1>
        </div>
        <div class="flex items-center gap-4">
            <div class="text-xs uppercase tracking-widest text-brand-accent px-2 py-1 border border-white/10 rounded bg-white/5">USER: {{ username }}</div>
            <div class="text-sm opacity-50 hidden md:block" id="current-time"></div>
        </div>

        <div id="menu-dropdown" class="absolute top-10 left-2 w-48 bg-[#0A0A0B] border border-white/10 rounded-lg shadow-2xl hidden flex-col z-50 overflow-hidden" style="backdrop-filter: blur(15px); background-color: rgba(10, 10, 11, 0.9);">
            <a href="/" class="px-4 py-3 text-sm hover:bg-white/5 hover:text-brand-acid transition-colors border-b border-white/5">Dashboard</a>
            <a href="/timetable" class="px-4 py-3 text-sm hover:bg-white/5 hover:text-brand-acid transition-colors border-b border-white/5">Timetable</a>
            <a href="/chat" class="px-4 py-3 text-sm hover:bg-white/5 hover:text-brand-acid transition-colors border-b border-white/5">SYS.AI Chat</a>
            <a href="/reminder" class="px-4 py-3 text-sm hover:bg-white/5 hover:text-brand-acid transition-colors border-b border-white/5">Set Reminder</a>
            <a href="/cgpa" class="px-4 py-3 text-sm hover:bg-white/5 hover:text-brand-acid transition-colors border-b border-white/5">CGPA Calculator</a>
            <a href="/logout" class="px-4 py-3 text-sm hover:bg-red-500/20 text-red-400 transition-colors">Logout</a>
        </div>
    </header>

    <main class="flex-1 grid grid-cols-1 lg:grid-cols-3 gap-6 overflow-hidden">
        
        <!-- Widget A (The Pulse) -->
        <section class="glass-widget flex flex-col gap-6 lg:col-span-1 overflow-y-auto">
            <h2 class="text-sm tracking-wider uppercase opacity-70">The Pulse</h2>
            
            <div class="flex items-center justify-between">
                <div>
                    <div class="text-4xl font-bold mb-1" id="tasks-today">0</div>
                    <div class="text-xs opacity-50">Tasks Due Today</div>
                </div>
                
                <!-- System Progress Ring -->
                <div class="relative w-24 h-24">
                    <svg class="w-full h-full" viewBox="0 0 100 100">
                        <circle class="progress-ring__background" stroke-width="8" fill="transparent" r="40" cx="50" cy="50"/>
                        <circle class="progress-ring__circle" stroke-width="8" stroke-linecap="round" fill="transparent" r="40" cx="50" cy="50" stroke-dasharray="251.2" stroke-dashoffset="251.2" id="progress-circle"/>
                    </svg>
                    <div class="absolute inset-0 flex items-center justify-center">
                        <span class="text-sm font-bold" id="progress-text">0%</span>
                    </div>
                </div>
            </div>

            <div class="mt-4">
                <div class="text-xs mb-2 opacity-50 uppercase tracking-widest">Stats Overview</div>
                <div class="flex justify-between items-center text-sm mb-1">
                    <span>Active</span>
                    <span id="stat-active" class="text-brand-acid">0</span>
                </div>
                <div class="flex justify-between items-center text-sm mb-1">
                    <span>Completed</span>
                    <span id="stat-completed" class="opacity-70">0</span>
                </div>
                <div class="flex justify-between items-center text-sm">
                    <span>Overdue</span>
                    <span id="stat-overdue" class="text-red-400">0</span>
                </div>
            </div>
        </section>

        <!-- Widget B (Chronos Timeline) -->
        <section class="glass-widget flex flex-col lg:col-span-2 overflow-hidden">
            <h2 class="text-sm tracking-wider uppercase opacity-70 mb-4">Chronos Timeline</h2>
            
            <div class="flex-1 overflow-y-auto pr-2 space-y-4" id="task-list">
                <!-- Tasks will be injected here -->
            </div>
        </section>

    </main>

    <!-- Widget C (Quick-Input Terminal) -->
    <section class="glass-widget flex items-center p-4">
        <span class="text-brand-accent mr-3">❯</span>
        <input type="text" id="terminal-input" class="w-full bg-transparent border-none text-sm placeholder-white/30" placeholder="Task String (e.g., DSA Quiz, 2026-05-20, High)... Press Enter to submit" autocomplete="off">
    </section>

    <script>
        // Update Time
        function updateTime() {
            document.getElementById('current-time').innerText = new Date().toISOString().replace('T', ' ').substring(0, 19) + ' UTC';
        }
        setInterval(updateTime, 1000);
        updateTime();

        // Menu Dropdown
        const menuBtn = document.getElementById('menu-btn');
        const menuDropdown = document.getElementById('menu-dropdown');
        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            menuDropdown.classList.toggle('hidden');
            menuDropdown.classList.toggle('flex');
        });
        document.addEventListener('click', (e) => {
            if (!menuDropdown.classList.contains('hidden') && !menuDropdown.contains(e.target)) {
                menuDropdown.classList.add('hidden');
                menuDropdown.classList.remove('flex');
            }
        });

        // Fetch Tasks
        async function fetchTasks() {
            try {
                const res = await fetch('/api/tasks');
                const tasks = await res.json();
                renderTasks(tasks);
                updatePulse(tasks);
            } catch (err) {
                console.error("Failed to fetch tasks", err);
            }
        }

        function renderTasks(tasks) {
            const list = document.getElementById('task-list');
            list.innerHTML = '';
            
            tasks.forEach(task => {
                const isUrgent = task.urgency_flag;
                const isOverdue = task.status === 'Overdue';
                const isCompleted = task.status === 'Completed';
                
                const glowClass = (isUrgent && !isCompleted && !isOverdue) ? 'urgent-glow' : '';
                const opacityClass = isCompleted ? 'opacity-40 line-through' : '';
                const statusColor = isOverdue ? 'text-red-400' : (isCompleted ? 'text-gray-400' : 'text-brand-acid');
                
                // Format deadline beautifully
                const dateObj = new Date(task.deadline);
                const dateStr = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                const timeStr = dateObj.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

                const el = document.createElement('div');
                el.className = `p-4 rounded-lg bg-white/5 border border-white/10 flex justify-between items-center transition-all hover:bg-white/10 ${glowClass} ${opacityClass}`;
                
                el.innerHTML = `
                    <div class="flex items-center gap-4">
                        <button onclick="toggleComplete(${task.id}, '${task.status}')" class="w-5 h-5 rounded border border-white/30 flex items-center justify-center hover:border-brand-acid transition-colors focus:outline-none">
                            ${isCompleted ? '<div class="w-3 h-3 bg-brand-acid rounded-sm"></div>' : ''}
                        </button>
                        <div>
                            <div class="font-bold text-sm md:text-base">${task.title}</div>
                            <div class="text-xs opacity-60 flex gap-3 mt-1">
                                <span>[${task.category}]</span>
                                <span>DL: ${dateStr} ${timeStr}</span>
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center gap-4 text-xs">
                        <div class="hidden md:block">
                            <span class="px-2 py-1 rounded bg-white/5 border border-white/10 uppercase tracking-wide ${task.priority === 'High' || task.priority === 'Critical' ? 'text-brand-accent' : ''}">${task.priority}</span>
                        </div>
                        <div class="${statusColor} uppercase tracking-wider w-20 text-right">${task.status}</div>
                        <button onclick="deleteTask(${task.id})" class="text-white/30 hover:text-red-400 transition-colors ml-2">
                            ✕
                        </button>
                    </div>
                `;
                list.appendChild(el);
            });
        }

        function updatePulse(tasks) {
            let total = tasks.length;
            let completed = 0;
            let active = 0;
            let overdue = 0;
            let dueToday = 0;

            const todayStr = new Date().toISOString().substring(0, 10);

            tasks.forEach(t => {
                if (t.status === 'Completed') completed++;
                else if (t.status === 'Overdue') overdue++;
                else active++;

                if (t.deadline.startsWith(todayStr) && t.status !== 'Completed') {
                    dueToday++;
                }
            });

            document.getElementById('stat-active').innerText = active;
            document.getElementById('stat-completed').innerText = completed;
            document.getElementById('stat-overdue').innerText = overdue;
            document.getElementById('tasks-today').innerText = dueToday;

            // Progress Ring
            const percent = total === 0 ? 0 : Math.round((completed / total) * 100);
            const circle = document.getElementById('progress-circle');
            const circumference = 2 * Math.PI * 40; // r=40
            const offset = circumference - (percent / 100) * circumference;
            circle.style.strokeDashoffset = offset;
            document.getElementById('progress-text').innerText = `${percent}%`;
        }

        // Actions
        async function toggleComplete(id, currentStatus) {
            const newStatus = currentStatus === 'Completed' ? 'Active' : 'Completed';
            await fetch(`/api/tasks/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: newStatus })
            });
            fetchTasks();
        }

        async function deleteTask(id) {
            await fetch(`/api/tasks/${id}`, { method: 'DELETE' });
            fetchTasks();
        }

        // Terminal Input
        document.getElementById('terminal-input').addEventListener('keydown', async function(e) {
            if (e.key === 'Enter' && this.value.trim() !== '') {
                const val = this.value.trim();
                this.value = '';
                this.disabled = true;
                await fetch('/api/tasks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ task_string: val })
                });
                this.disabled = false;
                this.focus();
                fetchTasks();
            }
        });

        // Init
        fetchTasks();
    </script>
</body>
</html>
